<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfil da Equipe - HD Distribuidora</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#F0F3F8;--surface:#fff;--border:#C8D6E8;--text:#1A1E2E;--muted:#5E6680;--hint:#8893B0;--accent:#2E4DA6;--light:#E8EDF8;--dark:#1A2D6B;--r:14px;--warn:#E8A020;--danger:#C0392B;--ok:#1E8449}
body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--text);font-size:15px;padding-bottom:3rem}
a.back{position:fixed;top:1rem;left:1rem;z-index:99;background:#fff;border:1.5px solid var(--accent);color:var(--accent);padding:6px 16px;border-radius:8px;font-size:.82rem;font-weight:600;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
a.back:hover{background:var(--light)}
.hero{background:linear-gradient(135deg,var(--dark),var(--accent));color:#fff;padding:3rem 2rem 0;text-align:center}
.hero img{width:64px;height:64px;border-radius:50%;border:3px solid rgba(255,255,255,.3);margin-bottom:1rem;object-fit:cover}
.hero h1{font-family:"Lora",serif;font-size:1.8rem;font-weight:700;margin-bottom:.4rem}
.hero p{opacity:.85;font-size:.95rem}
.upd{margin-top:.75rem;font-size:.78rem;opacity:.65;padding-bottom:1rem}
.tabs{display:flex;justify-content:center;gap:0;background:rgba(0,0,0,.2);padding:.75rem 1.5rem 0;flex-wrap:wrap}
.tab-btn{background:transparent;border:none;color:rgba(255,255,255,.7);font-family:"DM Sans",sans-serif;font-size:.88rem;font-weight:500;padding:.6rem 1.4rem;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s}
.tab-btn:hover{color:#fff}
.tab-btn.active{color:#fff;border-bottom:3px solid #fff;font-weight:700}
.tab-panel{display:none}.tab-panel.active{display:block}
.wrap{max-width:1100px;margin:0 auto;padding:2rem 1.5rem}
.kgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:12px;margin-bottom:2rem}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem 1rem;text-align:center}
.kpi .n{font-family:"Lora",serif;font-size:2.2rem;font-weight:700;color:var(--accent);line-height:1}
.kpi .n.warn{color:var(--warn)}.kpi .n.danger{color:var(--danger)}.kpi .n.ok{color:var(--ok)}
.kpi .l{font-size:.8rem;color:var(--hint);margin-top:.35rem;font-weight:500}
.kpi .s{font-size:.7rem;color:var(--hint);margin-top:.2rem}
.sec{font-family:"Lora",serif;font-size:1.05rem;font-weight:700;color:var(--dark);margin:1.5rem 0 1rem}
.cgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:1.25rem;margin-bottom:1.5rem}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem}
.card h3{font-family:"Lora",serif;font-size:.92rem;font-weight:600;color:var(--dark);margin-bottom:1rem;padding-bottom:.5rem;border-bottom:1px solid var(--light)}
.bar{display:flex;align-items:center;gap:.6rem;margin-bottom:.55rem;font-size:.84rem}
.bar .nm{min-width:130px;color:var(--muted);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0}
.bar .tr{flex:1;height:8px;background:var(--light);border-radius:4px;overflow:hidden}
.bar .fi{height:100%;background:var(--accent);border-radius:4px}
.bar .fi.warn{background:var(--warn)}.bar .fi.danger{background:var(--danger)}
.bar .ct{min-width:24px;text-align:right;color:var(--hint);font-size:.76rem}
.bar .pc{min-width:34px;text-align:right;color:var(--accent);font-size:.76rem;font-weight:600}
.chips{display:flex;flex-wrap:wrap;gap:.5rem}
.chip{background:var(--light);border:1px solid var(--border);border-radius:8px;padding:.3rem .75rem;font-size:.82rem;color:var(--dark);font-weight:500}
.filter-row{display:flex;align-items:center;gap:.75rem;margin-bottom:1.25rem;flex-wrap:wrap}
.filter-row label{font-size:.84rem;color:var(--muted);font-weight:500}
.filter-row select{border:1px solid var(--border);border-radius:8px;padding:.4rem .75rem;font-size:.84rem;font-family:"DM Sans",sans-serif;color:var(--text);background:#fff;cursor:pointer}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.83rem}
th{background:var(--light);color:var(--dark);font-weight:600;padding:.6rem .75rem;text-align:left;white-space:nowrap;border-bottom:2px solid var(--border)}
td{padding:.55rem .75rem;border-bottom:1px solid var(--light);color:var(--muted)}
tr:last-child td{border-bottom:none}
tr:hover td{background:#F7F9FD}
.badge{display:inline-block;padding:.15rem .6rem;border-radius:20px;font-size:.72rem;font-weight:600}
.badge.ativo{background:#D5F0E0;color:#1E6E3A}
.badge.afas{background:#FFF3CD;color:#7A5000}
.badge.desl{background:#FDECEA;color:#9b3a2e}
.empty{text-align:center;padding:1.5rem;color:var(--hint);font-size:.84rem;border:1px dashed var(--border);border-radius:8px}
.spin{width:30px;height:30px;border:3px solid var(--light);border-top-color:var(--accent);border-radius:50%;animation:sp 1s linear infinite;margin:0 auto 1rem}
@keyframes sp{to{transform:rotate(360deg)}}
.loading{text-align:center;padding:3rem;color:var(--hint)}
.err{background:#fdf0ee;border:1px solid #e8b4ae;border-radius:10px;padding:1rem 1.25rem;color:#9b3a2e;font-size:.88rem;margin:1rem 0}
.month-chart{display:flex;align-items:flex-end;gap:6px;height:120px;margin-bottom:1rem}
.mcol{display:flex;flex-direction:column;align-items:center;flex:1;gap:4px}
.mbar{width:100%;background:var(--accent);border-radius:4px 4px 0 0;transition:height .3s;min-height:2px}
.mbar.warn{background:var(--warn)}.mbar.danger{background:var(--danger)}
.mlbl{font-size:.65rem;color:var(--hint);text-align:center;white-space:nowrap}
.mval{font-size:.7rem;color:var(--accent);font-weight:600}
@media(max-width:580px){.kgrid{grid-template-columns:repeat(2,1fr)}.tab-btn{font-size:.78rem;padding:.5rem .9rem}}

/* ── PRINT ─────────────────────────────────────────────────── */
.print-btn{position:fixed;bottom:1.5rem;right:1.5rem;z-index:999;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:10px 20px;font-family:"DM Sans",sans-serif;font-size:.88rem;font-weight:600;cursor:pointer;box-shadow:0 4px 16px rgba(46,77,166,.3);display:flex;align-items:center;gap:6px;transition:background .15s}
.print-btn:hover{background:var(--dark)}
@media print{
  .print-btn,.back,.tabs,.tab-btn,.filter-row,#loading{display:none!important}
  .tab-panel{display:block!important}
  body{background:#fff;font-size:12px;padding:0}
  .wrap{max-width:100%;padding:0 1rem}
  .hero{padding:1rem;background:none;color:#1A2D6B;border-bottom:2px solid #2E4DA6;margin-bottom:1rem}
  .hero img{width:40px;height:40px}
  .hero h1{font-size:1.3rem;color:#1A2D6B}
  .hero p,.upd{color:#5E6680;font-size:.8rem}
  .print-section{page-break-before:always;margin-top:1.5rem}
  .print-section:first-child{page-break-before:avoid}
  .print-title{font-family:"Lora",serif;font-size:1rem;font-weight:700;color:#1A2D6B;border-bottom:2px solid #2E4DA6;padding-bottom:.4rem;margin-bottom:1rem}
  .kgrid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:1rem}
  .kpi{border:1px solid #C8D6E8;border-radius:8px;padding:.6rem .5rem;text-align:center}
  .kpi .n{font-size:1.4rem;color:#2E4DA6}
  .kpi .l{font-size:.65rem;color:#8893B0}
  .kpi .s{font-size:.6rem;color:#8893B0}
  .cgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:1rem}
  .card{border:1px solid #C8D6E8;border-radius:8px;padding:1rem;break-inside:avoid}
  .card h3{font-size:.8rem;font-weight:700;color:#1A2D6B;margin-bottom:.6rem;padding-bottom:.3rem;border-bottom:1px solid #E8EDF8}
  .bar{display:flex;align-items:center;gap:.4rem;margin-bottom:.35rem;font-size:.72rem}
  .bar .nm{min-width:110px}
  .bar .tr{flex:1;height:6px;background:#E8EDF8;border-radius:3px}
  .bar .fi{height:100%;background:#2E4DA6;border-radius:3px}
  .bar .fi.warn{background:#E8A020}
  .bar .fi.danger{background:#C0392B}
  .bar .ct,.bar .pc{font-size:.65rem}
  .chip{font-size:.72rem;padding:.2rem .5rem}
  table{font-size:.7rem}
  th{font-size:.7rem;padding:.4rem .5rem}
  td{padding:.35rem .5rem}
  .month-chart{height:80px}
  .mval{font-size:.6rem}
  .mlbl{font-size:.55rem}
  .sec{font-size:.9rem;margin:1rem 0 .6rem}
  .badge{font-size:.6rem}
}
</style>
</head>
<body>
<a href="../index.html" class="back">&#8592; In&iacute;cio</a>
<div class="hero">
  <img src="../logo.jpg" alt="HD Distribuidora">
  <h1>Perfil da Equipe</h1>
  <p>Indicadores e composi&ccedil;&atilde;o da equipe da HD Distribuidora</p>
  <div class="upd" id="upd">Carregando...</div>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('equipe',this)">&#128101; Equipe Ativa</button>
    <button class="tab-btn" onclick="switchTab('afastamentos',this)">&#128197; Afastamentos</button>
    <button class="tab-btn" onclick="switchTab('desligados',this)">&#128683; Desligados</button>
  </div>
</div>
<div class="wrap">
  <div id="loading" class="loading"><div class="spin"></div>Carregando dados...</div>
  <div id="tab-equipe" class="tab-panel"></div>
  <div id="tab-afastamentos" class="tab-panel"></div>
  <div id="tab-desligados" class="tab-panel"></div>
</div>
<script>
var SCRIPT_URL='https://script.google.com/macros/s/AKfycbwx1dgtUQRwO1nnUFvYg3YumEdWz5ll7f4y1eeogxhogYM0uVGLa5Xzc2ZYcOWIhp2p/exec';
var MESES=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
var MESES_ABREV=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
var _afasGlobal=[], _desGlobal=[];

function switchTab(id,btn){
  document.querySelectorAll('.tab-panel').forEach(function(p){p.style.display='none';p.classList.remove('active');});
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
  var el=document.getElementById('tab-'+id);
  el.style.display='block';el.classList.add('active');
  btn.classList.add('active');
}

function v(row,key){
  // Tenta chave exata, depois case-insensitive
  if(row[key]!==undefined&&row[key]!==null)return String(row[key]).trim();
  var keys=Object.keys(row);
  var k=keys.find(function(k){return k.trim()===key.trim();});
  if(k)return String(row[k]).trim();
  return '';
}

function vk(row,candidates){
  for(var i=0;i<candidates.length;i++){var r=v(row,candidates[i]);if(r!=='')return r;}
  return '';
}

function grp(arr,fn){return arr.reduce(function(a,r){var k=fn(r);if(!k||k==='')k='Sem informação';a[k]=(a[k]||0)+1;return a;},{});}
function srt(o){return Object.entries(o).sort(function(a,b){return b[1]-a[1];});}
function card(t,inner){return '<div class="card"><h3>'+t+'</h3>'+inner+'</div>';}
function empty(msg){return '<div class="empty">'+(msg||'Sem dados disponíveis')+'</div>';}
function kbox(n,l,s,cls){return '<div class="kpi"><div class="n'+(cls?' '+cls:'')+'">'+(n===null||n===undefined?'—':n)+'</div><div class="l">'+l+'</div>'+(s?'<div class="s">'+s+'</div>':'')+'</div>';}

function bars(data,total,title,colorClass){
  if(!data||!data.length)return card(title,empty());
  var known=data.filter(function(x){return x[0]!=='Sem informação';});
  var unk=data.filter(function(x){return x[0]==='Sem informação';});
  var all=known.concat(unk);
  if(!all.length)return card(title,empty());
  var html=all.map(function(x){
    var pct=total>0?Math.round(x[1]/total*100):0;
    var cc=colorClass||'';
    return '<div class="bar"><span class="nm" title="'+x[0]+'">'+x[0]+'</span><div class="tr"><div class="fi '+cc+'" style="width:'+pct+'%"></div></div><span class="ct">'+x[1]+'</span><span class="pc">'+pct+'%</span></div>';
  }).join('');
  return card(title,html);
}

function tempo(m){
  if(m===null||m===undefined)return null;
  if(m<6)return 'Menos de 6 meses';
  if(m<12)return '6 a 11 meses';
  if(m<24)return '1 a 2 anos';
  if(m<60)return '2 a 5 anos';
  return 'Mais de 5 anos';
}

function parseDateSafe(str){
  if(!str||str.trim()==='')return null;
  var d=new Date(str);
  if(isNaN(d))return null;
  if(d.getFullYear()>=new Date().getFullYear()-1)return null;
  return d;
}

function parseDate(str){
  if(!str||str.trim()==='')return null;
  // Tentar formato dd/MM/yyyy
  var m=str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(m)return new Date(parseInt(m[3]),parseInt(m[2])-1,parseInt(m[1]));
  var d=new Date(str);
  return isNaN(d)?null:d;
}

function monthKey(d){
  return MESES_ABREV[d.getMonth()]+'/'+d.getFullYear();
}

// ── TAB EQUIPE ────────────────────────────────────────────────────────────
function renderEquipe(colab){
  var agora=new Date();
  var mes=agora.getMonth()+1;
  var data=colab.map(function(r){
    var admStr=vk(r,['Admissão','Admissao']);
    var meses=null;
    if(admStr){var d=parseDate(admStr);if(d)meses=Math.floor((Date.now()-d.getTime())/(1000*60*60*24*30.44));}
    var nascDate=parseDateSafe(vk(r,['Aniversário','Aniversario']));
    var fRaw=vk(r,['Faixa Etária','Faixa Etaria','Idade']);
    var faixa=null;
    if(fRaw){
      var num=parseInt(fRaw);
      if(!isNaN(num)&&num!==126&&num<=100){
        if(num<25)faixa='Até 24 anos';
        else if(num<35)faixa='25-34 anos';
        else if(num<45)faixa='35-44 anos';
        else if(num<55)faixa='45-54 anos';
        else faixa='55+ anos';
      } else if(isNaN(num)){faixa=fRaw;}
    }
    return{
      nome:vk(r,['Colaborador']),
      filial:vk(r,['Alocação','Alocacao']),
      depto:vk(r,['Departamento']),
      genero:vk(r,['Sexo']),
      faixa:faixa,
      escol:vk(r,['Grau Formação','Grau Formacao']),
      contrat:vk(r,['Tipo de Contrato','Contrato']),
      meses:meses,
      nascDate:nascDate
    };
  }).filter(function(r){return r.nome!=='';});

  var total=data.length;
  var anivs=data.filter(function(r){return r.nascDate&&(r.nascDate.getMonth()+1)===mes;})
    .map(function(r){return{nome:r.nome.split(' ').slice(0,2).join(' '),dia:r.nascDate.getDate()};})
    .sort(function(a,b){return a.dia-b.dia;});
  var filiais=srt(grp(data,function(r){return r.filial||null;}));
  var deptos=srt(grp(data,function(r){return r.depto||null;}));
  var generos=srt(grp(data,function(r){return r.genero||null;}));
  var faixas=srt(grp(data,function(r){return r.faixa||null;}));
  var escols=srt(grp(data,function(r){return r.escol||null;}));
  var contratos=srt(grp(data,function(r){return r.contrat||null;}));
  var TORDR=['Menos de 6 meses','6 a 11 meses','1 a 2 anos','2 a 5 anos','Mais de 5 anos'];
  var temposRaw=srt(grp(data,function(r){return tempo(r.meses);}));
  var temposOrd=TORDR.map(function(k){return[k,(temposRaw.find(function(d){return d[0]===k;})||[k,0])[1]];}).filter(function(x){return x[1]>0;});
  var fk=filiais.filter(function(x){return x[0]!=='Sem informação';});
  var dk=deptos.filter(function(x){return x[0]!=='Sem informação';});
  var novos=data.filter(function(r){return r.meses!==null&&r.meses<6;}).length;
  var seniors=data.filter(function(r){return r.meses!==null&&r.meses>=60;}).length;
  var anivCard=card('Aniversariantes do Mês',anivs.length?'<div class="chips">'+anivs.map(function(a){return'<span class="chip">'+a.nome+' &mdash; dia '+a.dia+'</span>';}).join('')+'</div>':empty('Nenhum aniversariante este mês'));

  document.getElementById('tab-equipe').innerHTML=
    '<div class="kgrid">'+
      kbox(total,'Colaboradores Ativos')+
      kbox(fk.length||'?','Filiais',fk.map(function(x){return x[0]+': '+x[1];}).join(' &middot; '))+
      kbox(dk.length||'?','Departamentos')+
      kbox(anivs.length,'Aniversariantes','neste mês')+
      kbox(novos,'Novos','menos de 6 meses')+
      kbox(seniors,'Veteranos','5+ anos de casa')+
    '</div>'+
    '<div class="sec">Por Filial e Departamento</div>'+
    '<div class="cgrid">'+bars(filiais,total,'Por Filial')+bars(deptos,total,'Por Departamento')+'</div>'+
    '<div class="sec">Composição da Equipe</div>'+
    '<div class="cgrid">'+bars(generos,total,'Por Gênero')+bars(faixas,total,'Por Faixa Etária')+bars(escols,total,'Por Escolaridade')+bars(contratos,total,'Por Contratação')+'</div>'+
    '<div class="sec">Tempo de Casa e Aniversariantes</div>'+
    '<div class="cgrid">'+bars(temposOrd,total,'Tempo de Casa')+anivCard+'</div>';
}

// ── TAB AFASTAMENTOS ──────────────────────────────────────────────────────
function renderAfastamentos(raw){
  // Cabeçalhos reais: Colaborador, Alocação, CPF, Função, Departamento,
  // "Afastamento em:", "Motivo do Afastamento:", "Observações do Afastamento", "Retorno ao trabalho em:"
  _afasGlobal=raw.map(function(r){
    var inicio=parseDate(vk(r,['Afastamento em:','Afastamento em']));
    var retorno=parseDate(vk(r,['Retorno ao trabalho em:','Retorno ao trabalho em']));
    return{
      nome:v(r,'Colaborador'),
      filial:vk(r,['Alocação','Alocacao']),
      funcao:vk(r,['Função','Funcao']),
      depto:v(r,'Departamento'),
      motivo:vk(r,['Motivo do Afastamento:','Motivo do Afastamento']),
      obs:vk(r,['Observações do Afastamento','Observacoes do Afastamento']),
      inicio:inicio,
      retorno:retorno,
      mesPt:inicio?monthKey(inicio):null
    };
  }).filter(function(r){return r.nome!=='';});
  drawAfastamentos('todos');
}

function drawAfastamentos(filtroMes){
  var dados=_afasGlobal;
  var mesSet={};
  var mesesDisp=['todos'];
  dados.forEach(function(r){if(r.mesPt&&!mesSet[r.mesPt]){mesSet[r.mesPt]=true;mesesDisp.push(r.mesPt);}});
  var filtrados=filtroMes==='todos'?dados:dados.filter(function(r){return r.mesPt===filtroMes;});

  // Gráfico por mês
  var porMes={};
  dados.forEach(function(r){if(r.mesPt)porMes[r.mesPt]=(porMes[r.mesPt]||0)+1;});
  var mesEntries=Object.entries(porMes);
  var maxVal=mesEntries.reduce(function(m,x){return Math.max(m,x[1]);},1);
  var chartHtml=mesEntries.length?
    '<div class="month-chart">'+mesEntries.map(function(e){
      var h=Math.round((e[1]/maxVal)*100);
      return '<div class="mcol"><div class="mval" style="color:var(--warn)">'+e[1]+'</div><div class="mbar warn" style="height:'+h+'px"></div><div class="mlbl">'+e[0]+'</div></div>';
    }).join('')+'</div>':empty('Sem afastamentos registrados');

  var agora=new Date();
  var emCursoCount=filtrados.filter(function(r){return !r.retorno||r.retorno>agora;}).length;
  var motivos=srt(grp(filtrados,function(r){return r.motivo||null;}));
  var porFilial=srt(grp(filtrados,function(r){return r.filial||null;}));

  var selectOpts=mesesDisp.map(function(m){
    return'<option value="'+m+'"'+(m===filtroMes?' selected':'')+'>'+(m==='todos'?'Todos os meses':m)+'</option>';
  }).join('');

  var linhas=filtrados.map(function(r){
    var ec=!r.retorno||r.retorno>agora;
    return '<tr><td>'+r.nome+'</td><td>'+r.filial+'</td><td>'+r.depto+'</td><td>'+r.motivo+'</td>'+
      '<td>'+(r.inicio?r.inicio.toLocaleDateString('pt-BR'):'—')+'</td>'+
      '<td>'+(r.retorno?r.retorno.toLocaleDateString('pt-BR'):'—')+'</td>'+
      '<td><span class="badge '+(ec?'afas':'ativo')+'">'+(ec?'Em curso':'Retornou')+'</span></td>'+
      '<td style="font-size:.78rem;color:var(--hint)">'+r.obs+'</td></tr>';
  }).join('');

  var tabela=filtrados.length?
    '<div class="tbl-wrap"><table><thead><tr><th>Colaborador</th><th>Filial</th><th>Depto</th><th>Motivo</th><th>Início</th><th>Retorno</th><th>Status</th><th>Observações</th></tr></thead><tbody>'+linhas+'</tbody></table></div>':
    empty('Nenhum afastamento'+(filtroMes!=='todos'?' em '+filtroMes:''));

  document.getElementById('tab-afastamentos').innerHTML=
    '<div class="sec">Ocorrências por Mês</div>'+
    '<div class="cgrid" style="grid-template-columns:1fr">'+card('Afastamentos por Mês',chartHtml)+'</div>'+
    '<div class="filter-row"><label>Filtrar por mês:</label><select onchange="drawAfastamentos(this.value)">'+selectOpts+'</select></div>'+
    '<div class="kgrid">'+
      kbox(filtrados.length,'Afastamentos',(filtroMes==='todos'?'total registrado':filtroMes))+
      kbox(emCursoCount,'Em curso','sem retorno registrado','warn')+
      kbox(motivos.filter(function(x){return x[0]!=='Sem informação';}).length,'Tipos de Motivo')+
    '</div>'+
    '<div class="sec">Por Motivo e Filial</div>'+
    '<div class="cgrid">'+bars(motivos,filtrados.length,'Por Motivo','warn')+bars(porFilial,filtrados.length,'Por Filial','warn')+'</div>'+
    '<div class="sec">Registros'+(filtroMes!=='todos'?' — '+filtroMes:'')+'</div>'+
    tabela;
}

// ── TAB DESLIGADOS ────────────────────────────────────────────────────────
function renderDesligados(raw){
  // Cabeçalhos reais (linha 2): Colaborador, Desligamento em:, Filial, Tipo de Desligamento,
  // Contrato, Tipo de Contrato, Função, Departamento, Admissão, Tempo de Serviço (Anos),
  // Salário na Saída, Vale Alimentação, Outros, Total
  _desGlobal=raw.map(function(r){
    var desD=parseDate(vk(r,['Desligamento em:','Desligamento em']));
    var admD=parseDate(vk(r,['Admissão','Admissao']));
    var tempoStr=vk(r,['Tempo de Serviço (Anos)','Tempo de Servico (Anos)']);
    var tempoAnos=tempoStr?parseFloat(tempoStr.replace(',','.')):null;
    var mesesCasa=tempoAnos&&!isNaN(tempoAnos)?Math.round(tempoAnos*12):null;
    return{
      nome:v(r,'Colaborador'),
      filial:v(r,'Filial'),
      depto:v(r,'Departamento'),
      funcao:vk(r,['Função','Funcao']),
      tipoDeslig:vk(r,['Tipo de Desligamento']),
      contrato:vk(r,['Tipo de Contrato','Contrato']),
      dataDeslig:desD,
      admissao:admD,
      mesesCasa:mesesCasa,
      tempoStr:tempoStr
    };
  }).filter(function(r){return r.nome!=='';});

  var dados=_desGlobal;
  var total=dados.length;
  var motivos=srt(grp(dados,function(r){return r.tipoDeslig||null;}));
  var porFilial=srt(grp(dados,function(r){return r.filial||null;}));
  var porDepto=srt(grp(dados,function(r){return r.depto||null;}));
  var tempos=srt(grp(dados,function(r){return tempo(r.mesesCasa);}));

  // Gráfico por mês
  var porMes={};
  dados.forEach(function(r){
    if(r.dataDeslig){var k=monthKey(r.dataDeslig);porMes[k]=(porMes[k]||0)+1;}
  });
  var mesEntries=Object.entries(porMes);
  var maxVal=mesEntries.reduce(function(m,x){return Math.max(m,x[1]);},1);
  var chartHtml=mesEntries.length?
    '<div class="month-chart">'+mesEntries.map(function(e){
      var h=Math.round((e[1]/maxVal)*100);
      return '<div class="mcol"><div class="mval" style="color:var(--danger)">'+e[1]+'</div><div class="mbar danger" style="height:'+h+'px"></div><div class="mlbl">'+e[0]+'</div></div>';
    }).join('')+'</div>':empty('Sem desligamentos registrados');

  var linhas=dados.map(function(r){
    return '<tr><td>'+r.nome+'</td><td>'+r.filial+'</td><td>'+r.depto+'</td><td>'+r.funcao+'</td>'+
      '<td><span class="badge desl">'+r.tipoDeslig+'</span></td>'+
      '<td>'+(r.dataDeslig?r.dataDeslig.toLocaleDateString('pt-BR'):'—')+'</td>'+
      '<td>'+(r.tempoStr?r.tempoStr+' anos':'—')+'</td></tr>';
  }).join('');

  var tabela=dados.length?
    '<div class="tbl-wrap"><table><thead><tr><th>Colaborador</th><th>Filial</th><th>Departamento</th><th>Função</th><th>Tipo</th><th>Desligamento</th><th>Tempo de Casa</th></tr></thead><tbody>'+linhas+'</tbody></table></div>':
    empty('Nenhum desligamento registrado');

  document.getElementById('tab-desligados').innerHTML=
    '<div class="sec">Desligamentos por Mês (2026+)</div>'+
    '<div class="cgrid" style="grid-template-columns:1fr">'+card('Evolução Mensal',chartHtml)+'</div>'+
    '<div class="kgrid">'+
      kbox(total,'Desligados','desde jan/2026','danger')+
      kbox(motivos.filter(function(x){return x[0]!=='Sem informação';}).length,'Tipos de Saída')+
      kbox(porFilial.filter(function(x){return x[0]!=='Sem informação';}).length,'Filiais afetadas')+
    '</div>'+
    '<div class="sec">Distribuição</div>'+
    '<div class="cgrid">'+bars(motivos,total,'Por Tipo de Saída','danger')+bars(porFilial,total,'Por Filial','danger')+'</div>'+
    '<div class="cgrid">'+bars(porDepto,total,'Por Departamento','danger')+bars(tempos,total,'Tempo de Casa na Saída')+'</div>'+
    '<div class="sec">Registros</div>'+
    tabela;
}

// ── FETCH ─────────────────────────────────────────────────────────────────
// JSONP — evita bloqueio CORS do Apps Script
function handleData(j) {
  if(j.erro){
    document.getElementById('loading').innerHTML='<div class="err">Erro no script: '+j.erro+'</div>';
    return;
  }
  document.getElementById('loading').style.display='none';
  document.getElementById('upd').textContent='Atualizado: '+new Date().toLocaleString('pt-BR');
  renderEquipe(j.colaboradores||[]);
  renderAfastamentos(j.afastamentos||[]);
  renderDesligados(j.desligados||[]);
  document.getElementById('tab-equipe').style.display='block';
  document.getElementById('tab-equipe').classList.add('active');
}

(function(){
  var s=document.createElement('script');
  s.src=SCRIPT_URL+'?callback=handleData';
  s.onerror=function(){
    document.getElementById('loading').innerHTML='<div class="err">Não foi possível carregar os dados.</div>';
  };
  document.body.appendChild(s);
})();
</script>

<button class="print-btn" onclick="imprimirDashboard()">&#128438; Imprimir / PDF</button>
<script>
function imprimirDashboard(){
  // Mostrar todas as tabs antes de imprimir
  var panels = document.querySelectorAll('.tab-panel');
  var btns = document.querySelectorAll('.tab-btn');
  panels.forEach(function(p){p.style.display='block';});
  
  // Adicionar títulos de seção para impressão
  var secTitles = ['Equipe Ativa', 'Afastamentos', 'Desligados'];
  var ids = ['tab-equipe','tab-afastamentos','tab-desligados'];
  ids.forEach(function(id, i){
    var el = document.getElementById(id);
    if(!el.querySelector('.print-section-header')){
      var h = document.createElement('div');
      h.className = 'print-section-header print-title';
      h.innerHTML = (i===0?'&#128101;':i===1?'&#128197;':'&#128683;') + ' ' + secTitles[i];
      el.insertBefore(h, el.firstChild);
    }
    if(i > 0) el.classList.add('print-section');
  });

  window.print();

  // Restaurar estado após impressão
  setTimeout(function(){
    panels.forEach(function(p, i){
      p.style.display = i===0 ? 'block' : 'none';
      p.classList.remove('print-section');
    });
    ids.forEach(function(id){
      var h = document.getElementById(id).querySelector('.print-section-header');
      if(h) h.remove();
    });
    btns[0].classList.add('active');
  }, 1000);
}
</script>
