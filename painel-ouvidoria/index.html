<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Ouvidoria | HD Distribuidora</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F0F3F8; --surface: #FFFFFF; --border: #C8D6E8;
    --text: #1C201A; --text-muted: #5E6659; --text-hint: #9AA394;
    --accent: #2E4DA6; --accent-light: #E8EDF8; --radius: 12px; --radius-sm: 8px;
    --red: #9b3a2e; --red-light: #fdf0ee;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  #tela-login { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem 1rem; }
  .login-box { background: white; border: 1px solid var(--border); border-radius: var(--radius); padding: 2.5rem 2rem; width: 100%; max-width: 380px; box-shadow: 0 8px 32px rgba(0,0,0,0.08); }
  .login-logo { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.75rem; }
  .login-logo img { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; }
  .login-logo h1 { font-family: 'Lora', serif; font-size: 1.1rem; font-weight: 700; color: var(--accent); line-height: 1.3; }
  .login-logo p { font-size: 0.78rem; color: var(--text-hint); }
  .login-field { margin-bottom: 1rem; }
  .login-field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-muted); margin-bottom: 0.35rem; }
  .login-field input { width: 100%; padding: 10px 13px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: border-color 0.15s; }
  .login-field input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(46,77,166,0.1); }
  .login-btn { width: 100%; padding: 11px; background: var(--accent); color: white; border: none; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 600; cursor: pointer; margin-top: 0.5rem; transition: background 0.15s; }
  .login-btn:hover { background: #1A2D6B; }
  .login-erro { background: var(--red-light); border: 1px solid #e8b4ae; border-radius: var(--radius-sm); padding: 0.6rem 0.9rem; font-size: 0.85rem; color: var(--red); margin-top: 0.75rem; display: none; }

  #tela-painel { display: none; padding: 2rem 1rem 5rem; }
  .container { max-width: 900px; margin: 0 auto; }
  .page-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; }
  .header-logo { width: 52px; height: 52px; border-radius: 50%; object-fit: cover; }
  .page-header h1 { font-family: 'Lora', serif; font-size: 1.4rem; font-weight: 700; color: var(--accent); }
  .page-header p { font-size: 0.85rem; color: var(--text-hint); margin-top: 2px; }
  .usuario-bar { display: flex; align-items: center; justify-content: space-between; background: var(--accent-light); border: 1px solid #c3dac9; border-radius: var(--radius-sm); padding: 0.6rem 1rem; margin-bottom: 1.5rem; font-size: 0.85rem; }
  .usuario-bar span { color: #1A2D6B; }
  .btn-sair { background: none; border: 1px solid var(--accent); color: var(--accent); padding: 4px 12px; border-radius: 6px; font-size: 0.8rem; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
  .btn-sair:hover { background: var(--accent); color: white; }
  .filtros { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1.25rem; align-items: center; }
  .filtro-pill { padding: 5px 14px; border-radius: 20px; border: 1.5px solid var(--border); background: white; font-size: 0.83rem; font-weight: 500; cursor: pointer; color: var(--text-muted); transition: all 0.15s; }
  .filtro-pill:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
  .filtro-pill.active { border-color: var(--accent); background: var(--accent); color: white; }
  .search-bar { position: relative; flex: 1; min-width: 200px; }
  .search-bar input { width: 100%; padding: 8px 13px 8px 36px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; background: white; }
  .search-bar input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(46,77,166,0.1); }
  .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text-hint); font-size: 13px; }
  .lista { display: flex; flex-direction: column; gap: 0.75rem; }
  .card-item { background: white; border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem 1.25rem; cursor: pointer; transition: all 0.15s; }
  .card-item:hover { border-color: var(--accent); box-shadow: 0 2px 8px rgba(46,77,166,0.12); }
  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; }
  .card-nome { font-weight: 700; font-size: 0.95rem; color: var(--text); }
  .card-data { font-size: 0.8rem; color: var(--text-hint); white-space: nowrap; }
  .card-cats { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
  .cat-badge { font-size: 0.72rem; font-weight: 700; padding: 2px 9px; border-radius: 20px; background: var(--accent-light); color: var(--accent); }
  .card-preview { font-size: 0.85rem; color: var(--text-muted); margin-top: 6px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .empty { text-align: center; padding: 3rem 1rem; color: var(--text-hint); }
  .loading { text-align: center; padding: 2rem; color: var(--text-hint); }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 1000; align-items: flex-start; justify-content: center; padding: 2rem 1rem; overflow-y: auto; }
  .modal-overlay.open { display: flex; }
  .modal { background: white; border-radius: var(--radius); width: 100%; max-width: 680px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.2); margin: auto; }
  .modal-header { position: sticky; top: 0; background: white; padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; z-index: 10; gap: 0.75rem; }
  .modal-titulo { font-family: 'Lora', serif; font-size: 1.1rem; font-weight: 700; color: var(--accent); flex: 1; }
  .modal-header-btns { display: flex; gap: 0.5rem; align-items: center; }
  .btn-imprimir { padding: 6px 14px; background: var(--accent); color: white; border: none; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: background 0.15s; display: flex; align-items: center; gap: 5px; }
  .btn-imprimir:hover { background: #1A2D6B; }
  .modal-close { width: 32px; height: 32px; border-radius: 50%; border: none; background: var(--bg); cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; color: var(--text-muted); }
  .modal-close:hover { background: var(--border); }
  .modal-body { padding: 1.5rem; }
  .detalhe-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text-hint); margin-bottom: 4px; }
  .detalhe-valor { font-size: 0.92rem; color: var(--text); line-height: 1.6; margin-bottom: 1.25rem; font-weight: 600; }
  .detalhe-mensagem { font-size: 0.92rem; color: var(--text); line-height: 1.7; white-space: pre-wrap; background: var(--bg); border-radius: var(--radius-sm); padding: 1rem; border: 1px solid var(--border); }
  .detalhe-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem; }

  /* IMPRESSÃO */
  @media print {
    body * { visibility: hidden; }
    #area-impressao, #area-impressao * { visibility: visible; }
    #area-impressao { position: fixed; inset: 0; padding: 32px; background: white; }
    .print-header-label { font-size: 9px; font-weight: bold; letter-spacing: 0.12em; text-transform: uppercase; color: #5E6659; margin-bottom: 4px; }
    .print-title { font-size: 24px; font-weight: bold; color: #1C201A; margin-bottom: 4px; font-family: Arial, sans-serif; }
    .print-sub { font-size: 12px; color: #9AA394; margin-bottom: 24px; }
    .print-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
    .print-table td { border: 1px solid #C8D6E8; padding: 10px 13px; vertical-align: top; }
    .print-label { font-size: 8px; font-weight: bold; letter-spacing: 0.1em; text-transform: uppercase; color: #9AA394; margin-bottom: 4px; }
    .print-value { font-size: 13px; font-weight: bold; color: #1C201A; }
    .print-sec { font-size: 9px; font-weight: bold; letter-spacing: 0.1em; text-transform: uppercase; color: #2E4DA6; border-bottom: 2px solid #2E4DA6; padding-bottom: 4px; margin-bottom: 10px; }
    .print-msg { border: 1px solid #C8D6E8; padding: 12px; font-size: 13px; line-height: 1.7; min-height: 60px; white-space: pre-wrap; }
    .print-footer { margin-top: 40px; border-top: 1px solid #C8D6E8; padding-top: 8px; display: flex; justify-content: space-between; font-size: 11px; color: #9AA394; }
    .print-cat { display: inline-block; background: #E8EDF8; color: #1A2D6B; border: 1px solid #c3dac9; padding: 2px 8px; font-size: 11px; border-radius: 20px; margin: 2px 3px 2px 0; }
  }
</style>
</head>
<body>

<!-- ÁREA DE IMPRESSÃO (oculta na tela) -->
<div id="area-impressao" style="display:none;"></div>

<!-- LOGIN -->
<div id="tela-login">
  <div class="login-box">
    <a href="../index.html" style="display:inline-flex;align-items:center;gap:6px;font-family:'DM Sans',sans-serif;font-size:0.82rem;font-weight:600;color:#2E4DA6;text-decoration:none;padding:5px 12px;border-radius:8px;border:1.5px solid #2E4DA6;margin-bottom:1.5rem;transition:background 0.15s;" onmouseover="this.style.background='#E8EDF8'" onmouseout="this.style.background='white'">← Início</a>
    <div class="login-logo">
      <img src="../logo.jpg" alt="HD Distribuidora">
      <div><h1>Painel Ouvidoria</h1><p>Conecta HD Distribuidora · RH</p></div>
    </div>
    <div class="login-field">
      <label>Usuário</label>
      <input type="text" id="inp-usuario" placeholder="seu usuário" onkeydown="if(event.key==='Enter') fazerLogin()">
    </div>
    <div class="login-field">
      <label>Senha</label>
      <input type="password" id="inp-senha" placeholder="sua senha" onkeydown="if(event.key==='Enter') fazerLogin()">
    </div>
    <button class="login-btn" onclick="fazerLogin()">Entrar</button>
    <div class="login-erro" id="login-erro">Usuário ou senha incorretos.</div>
  </div>
</div>

<!-- PAINEL -->
<div id="tela-painel">
  <a href="../index.html" style="position:fixed;top:1rem;left:1rem;z-index:9999;display:inline-flex;align-items:center;gap:6px;font-family:'DM Sans',sans-serif;font-size:0.82rem;font-weight:600;color:#2E4DA6;text-decoration:none;padding:6px 14px;border-radius:8px;border:1.5px solid #2E4DA6;background:white;box-shadow:0 2px 6px rgba(0,0,0,0.08);" onmouseover="this.style.background='#E8EDF8'" onmouseout="this.style.background='white'">← Início</a>
  <div class="container" style="padding-top:4rem;">
    <div class="page-header">
      <img src="../logo.jpg" alt="HD Distribuidora" class="header-logo">
      <div>
        <h1>Painel Ouvidoria — Conecta HD Distribuidora</h1>
        <p>Mensagens recebidas · RH</p>
      </div>
    </div>
    <div class="usuario-bar">
      <span>Logado como <b id="nome-usuario"></b></span>
      <button class="btn-sair" onclick="sair()">Sair</button>
    </div>
    <div class="filtros">
      <div class="search-bar">
        <span class="search-icon">🔍</span>
        <input type="text" id="busca" placeholder="Buscar por nome ou mensagem..." oninput="filtrar()">
      </div>
      <span class="filtro-pill active" onclick="filtrarCategoria('Todos', this)">Todos</span>
      <span class="filtro-pill" onclick="filtrarCategoria('Elogio', this)">Elogio</span>
      <span class="filtro-pill" onclick="filtrarCategoria('Sugestão', this)">Sugestão</span>
      <span class="filtro-pill" onclick="filtrarCategoria('Reclamação', this)">Reclamação</span>
      <span class="filtro-pill" onclick="filtrarCategoria('Dúvida', this)">Dúvida</span>
      <span class="filtro-pill" onclick="filtrarCategoria('Denúncia', this)">Denúncia</span>
      <span class="filtro-pill" onclick="filtrarCategoria('Outro', this)">Outro</span>
    </div>
    <div id="lista-wrap"><div class="loading">Carregando mensagens...</div></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="fecharModalClick(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-titulo" id="modal-titulo">Detalhe</span>
      <div class="modal-header-btns">
        <button class="btn-imprimir" onclick="imprimirMensagem()">🖨️ Imprimir</button>
        <button class="modal-close" onclick="fecharModal()">✕</button>
      </div>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyF8weV6rOPyTwkpZoGAtoxtg6XwVO9OF23Os2cuKVV-dkDym_Y1CC7hrAT7-sHPKk7Og/exec';

const SHEET_ID_OUVIDORIA = '1VSYscC0FPUtTl3NBCDwOaxsT2WkGKdY7av8e2ExEtVw';
const GID_RESPOSTAS      = '1400704772';

const USUARIOS = {
  'rh':      { senha: 'hdd@rh',      nome: 'RH',     perfil: 'rh' },
  'tais':    { senha: 'hdd@tais',    nome: 'Taís',   perfil: 'rh' },
  'paulo':   { senha: 'hdd@paulo',   nome: 'Paulo',  perfil: 'rh' },
  'renan':   { senha: 'hdd@renan',   nome: 'Renan',  perfil: 'rh' },
  'sandro':  { senha: 'hdd@sandro',  nome: 'Sandro', perfil: 'lider' },
  'juliana': { senha: 'hdd@juliana', nome: 'Juliana',perfil: 'lider' },
  'loren':   { senha: 'hdd@loren',   nome: 'Loren',  perfil: 'lider' },
};

let usuarioLogado  = null;
let todosRegistros = [];
let categoriaAtiva = 'Todos';
let registroAtual  = null;

// ── LOGIN ────────────────────────────────────────────────────
function fazerLogin() {
  const u   = document.getElementById('inp-usuario').value.trim().toLowerCase();
  const s   = document.getElementById('inp-senha').value;
  const usr = USUARIOS[u];
  if (!usr || usr.senha !== s) {
    document.getElementById('login-erro').style.display = 'block';
    return;
  }
  document.getElementById('login-erro').style.display = 'none';
  usuarioLogado = { ...usr, usuario: u };
  document.getElementById('tela-login').style.display  = 'none';
  document.getElementById('tela-painel').style.display = 'block';
  document.getElementById('nome-usuario').textContent  = usr.nome;
  carregar();
}

function sair() {
  usuarioLogado = null;
  document.getElementById('tela-painel').style.display = 'none';
  document.getElementById('tela-login').style.display  = 'flex';
  document.getElementById('inp-usuario').value = '';
  document.getElementById('inp-senha').value   = '';
}

// ── PARSER CSV CORRETO (lida com vírgula na data) ────────────
function parseCSVLine(linha) {
  const resultado = [];
  let atual = '';
  let dentroAspas = false;
  for (let i = 0; i < linha.length; i++) {
    const c = linha[i];
    if (c === '"') {
      dentroAspas = !dentroAspas;
    } else if (c === ',' && !dentroAspas) {
      resultado.push(atual.trim());
      atual = '';
    } else {
      atual += c;
    }
  }
  resultado.push(atual.trim());
  return resultado;
}

// ── CARREGAR ─────────────────────────────────────────────────
function carregar() {
  document.getElementById('lista-wrap').innerHTML = '<div class="loading">Carregando...</div>';
  var cbName = 'ouvidoriaPainelCb_' + Date.now();
  var script = document.createElement('script');
  var timeout = setTimeout(function(){
    document.getElementById('lista-wrap').innerHTML = '<div class="empty">⚠️ Tempo esgotado ao carregar. Tente novamente.</div>';
    if(script.parentNode) document.body.removeChild(script);
    delete window[cbName];
  }, 20000);
  window[cbName] = function(j) {
    clearTimeout(timeout);
    if(script.parentNode) document.body.removeChild(script);
    delete window[cbName];
    if(!j) { document.getElementById('lista-wrap').innerHTML = '<div class="empty">⚠️ Sem resposta do servidor.</div>'; return; }
    if(j.erro) { document.getElementById('lista-wrap').innerHTML = '<div class="empty">⚠️ Erro: ' + j.erro + '</div>'; return; }
    var rows = j.registros || [];
    todosRegistros = rows.map(function(r){ return { data: r['Data']||'', nome: r['Nome / Anônimo']||r['Nome']||'', categorias: r['Categorias']||r['Tipo']||'', mensagem: r['Mensagem']||r['Descrição']||'' }; }).filter(function(r){ return r.data; }).reverse();
    renderLista();
  };
  script.src = 'https://script.google.com/macros/s/AKfycbyF8weV6rOPyTwkpZoGAtoxtg6XwVO9OF23Os2cuKVV-dkDym_Y1CC7hrAT7-sHPKk7Og/exec?callback=' + cbName;
  script.onerror = function(){
    clearTimeout(timeout);
    document.getElementById('lista-wrap').innerHTML = '<div class="empty">⚠️ Erro ao carregar dados.</div>';
    delete window[cbName];
  };
  document.body.appendChild(script);
}

function filtrar() { renderLista(); }

function filtrarCategoria(cat, el) {
  categoriaAtiva = cat;
  document.querySelectorAll('.filtro-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  renderLista();
}

// ── RENDERIZAR LISTA ─────────────────────────────────────────
function renderLista() {
  const q = document.getElementById('busca').value.toLowerCase().trim();
  let dados = [...todosRegistros];
  if (categoriaAtiva !== 'Todos') {
    dados = dados.filter(r => r.categorias.includes(categoriaAtiva));
  }
  if (q) {
    dados = dados.filter(r =>
      r.nome.toLowerCase().includes(q) ||
      r.mensagem.toLowerCase().includes(q) ||
      r.categorias.toLowerCase().includes(q)
    );
  }
  if (!dados.length) {
    document.getElementById('lista-wrap').innerHTML = '<div class="empty">📭 Nenhuma mensagem encontrada.</div>';
    return;
  }
  document.getElementById('lista-wrap').innerHTML = '<div class="lista">' +
    dados.map(r => {
      const cats = r.categorias
        ? r.categorias.split(',').map(c => `<span class="cat-badge">${c.trim()}</span>`).join('')
        : '';
      const preview = r.mensagem.length > 120 ? r.mensagem.substring(0, 120) + '...' : r.mensagem;
      const idx = todosRegistros.indexOf(r);
      return `<div class="card-item" onclick="abrirDetalhe(${idx})">
        <div class="card-top">
          <div class="card-nome">${r.nome}</div>
          <div class="card-data">${r.data}</div>
        </div>
        <div class="card-cats">${cats}</div>
        <div class="card-preview">${preview}</div>
      </div>`;
    }).join('') + '</div>';
}

// ── DETALHE ──────────────────────────────────────────────────
function abrirDetalhe(idx) {
  registroAtual = todosRegistros[idx];
  const r = registroAtual;
  const cats = r.categorias
    ? r.categorias.split(',').map(c => `<span class="cat-badge" style="font-size:0.8rem;padding:3px 10px;">${c.trim()}</span>`).join(' ')
    : '—';
  document.getElementById('modal-titulo').textContent = r.nome;
  document.getElementById('modal-body').innerHTML = `
    <div class="detalhe-grid">
      <div><div class="detalhe-label">Remetente</div><div class="detalhe-valor">${r.nome}</div></div>
      <div><div class="detalhe-label">Data e Hora</div><div class="detalhe-valor">${r.data}</div></div>
    </div>
    <div style="margin-bottom:1.25rem">
      <div class="detalhe-label" style="margin-bottom:8px">Categorias</div>${cats}
    </div>
    <div>
      <div class="detalhe-label" style="margin-bottom:8px">Mensagem</div>
      <div class="detalhe-mensagem">${r.mensagem}</div>
    </div>
  `;
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function fecharModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function fecharModalClick(e) {
  if (e.target === document.getElementById('modal-overlay')) fecharModal();
}

// ── IMPRIMIR ─────────────────────────────────────────────────
function imprimirMensagem() {
  if (!registroAtual) return;
  const r = registroAtual;
  const cats = r.categorias
    ? r.categorias.split(',').map(c => `<span class="print-cat">${c.trim()}</span>`).join('')
    : '—';

  document.getElementById('area-impressao').innerHTML = `
    <div class="print-header-label">HD Distribuidora · Gestão de Pessoas</div>
    <div class="print-title">Ouvidoria — Conecta HD Distribuidora</div>
    <div class="print-sub">Registro de mensagem recebida</div>
    <table class="print-table">
      <tr>
        <td style="width:50%">
          <div class="print-label">Remetente</div>
          <div class="print-value">${r.nome}</div>
        </td>
        <td style="width:50%">
          <div class="print-label">Data e Hora</div>
          <div class="print-value">${r.data}</div>
        </td>
      </tr>
      <tr>
        <td colspan="2">
          <div class="print-label">Categorias</div>
          <div style="margin-top:5px">${cats}</div>
        </td>
      </tr>
    </table>
    <div class="print-sec">Mensagem</div>
    <div class="print-msg">${r.mensagem}</div>
    <div class="print-footer">
      <span>HD Distribuidora · Gestão de Pessoas</span>
      <span>${r.data}</span>
    </div>
  `;
  document.getElementById('area-impressao').style.display = 'block';
  window.print();
  document.getElementById('area-impressao').style.display = 'none';
}

window.onload = () => document.getElementById('inp-usuario').focus();
</script>
</body>
</html>
