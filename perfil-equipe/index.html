<!DOCTYPE html>

<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#F0F3F8;--surface:#fff;--border:#C8D6E8;--text:#1A1E2E;--muted:#5E6680;--hint:#8893B0;--accent:#2E4DA6;--accent-light:#E8EDF8;--accent-dark:#1A2D6B;--radius:14px}
body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.6;padding-bottom:3rem}
.nav-back{position:fixed;top:1rem;left:1rem;z-index:99;background:white;border:1.5px solid var(--accent);color:var(--accent);padding:6px 16px;border-radius:8px;font-size:.82rem;font-weight:600;text-decoration:none;display:inline-flex;align-items:center;gap:6px;transition:background .15s}
.nav-back:hover{background:var(--accent-light)}
.hero{background:linear-gradient(135deg,var(--accent-dark),var(--accent));color:#fff;padding:3rem 2rem 2rem;text-align:center}
.hero img{width:64px;height:64px;border-radius:50%;border:3px solid rgba(255,255,255,.3);margin-bottom:1rem;object-fit:cover}
.hero h1{font-family:"Lora",serif;font-size:1.8rem;font-weight:700;margin-bottom:.4rem}
.hero p{opacity:.85;font-size:.95rem}
.hero .update{margin-top:.75rem;font-size:.78rem;opacity:.65}
.container{max-width:1100px;margin:0 auto;padding:2rem 1.5rem}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:2rem}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem 1rem;text-align:center;transition:border-color .15s}
.kpi:hover{border-color:var(--accent)}
.kpi .num{font-family:"Lora",serif;font-size:2.2rem;font-weight:700;color:var(--accent);line-height:1}
.kpi .label{font-size:.8rem;color:var(--hint);margin-top:.35rem;font-weight:500}
.kpi .sub{font-size:.72rem;color:var(--hint);margin-top:.2rem}
.section-title{font-family:"Lora",serif;font-size:1.1rem;font-weight:700;color:var(--accent-dark);margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}
.charts-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1.25rem;margin-bottom:2rem}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem}
.card h3{font-family:"Lora",serif;font-size:.95rem;font-weight:600;color:var(--accent-dark);margin-bottom:1rem;padding-bottom:.5rem;border-bottom:1px solid var(--accent-light)}
.bar-item{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;font-size:.85rem}
.bar-item .name{min-width:100px;color:var(--muted);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-item .bar{flex:1;height:8px;background:var(--accent-light);border-radius:4px;overflow:hidden}
.bar-item .fill{height:100%;background:var(--accent);border-radius:4px;transition:width .6s ease}
.bar-item .count{min-width:30px;text-align:right;color:var(--hint);font-size:.78rem}
.bar-item .pct{min-width:36px;text-align:right;color:var(--accent);font-size:.78rem;font-weight:600}
.no-data{text-align:center;padding:1.5rem;color:var(--hint);font-size:.85rem;border:1px dashed var(--border);border-radius:8px}
.no-data .icon{font-size:1.5rem;margin-bottom:.5rem}
.aniversariantes{display:flex;flex-wrap:wrap;gap:.5rem}
.aniv-chip{background:var(--accent-light);border:1px solid var(--border);border-radius:8px;padding:.35rem .75rem;font-size:.82rem;color:var(--accent-dark);font-weight:500}
.loading{text-align:center;padding:3rem;color:var(--hint)}
.loading .spinner{width:32px;height:32px;border:3px solid var(--accent-light);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 1rem}
@keyframes spin{to{transform:rotate(360deg)}}
.erro{background:#fdf0ee;border:1px solid #e8b4ae;border-radius:10px;padding:1rem 1.25rem;color:#9b3a2e;font-size:.88rem;margin:1rem 0}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.82rem}
thead th{background:var(--accent-light);color:var(--accent-dark);font-weight:600;padding:.6rem .75rem;text-align:left;border-bottom:2px solid var(--border)}
tbody td{padding:.55rem .75rem;border-bottom:1px solid var(--border);color:var(--muted)}
tbody tr:hover td{background:#f8faff}
@media(max-width:600px){.kpi-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<a href="../index.html" class="nav-back">â InÃ­cio</a>
<div class="hero">
  <img src="../logo.jpg" alt="HD Distribuidora">
  <h1>Perfil da Equipe</h1>
  <p>Indicadores e composiÃ§Ã£o da equipe HD Distribuidora</p>
  <div class="update" id="update-time">Carregando dados...</div>
</div>
<div class="container">
  <div id="content"><div class="loading"><div class="spinner"></div>Carregando dados da equipe...</div></div>
</div>

<script>


const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzepwuAs3LRpzFwXXwlKQhPf11OoWxW5DP94ZqAowOTkA9bv0tPTus0Cy3Q-eNGPlJX/exec';

function normKey(s){ return s ? s.toLowerCase().normalize('NFD').replace(/[Ì-Í¯]/g,'').trim() : ''; }

function findCol(headers, keys){
  for(const k of keys){
    const idx = headers.findIndex(h => normKey(h) === normKey(k) || normKey(h).includes(normKey(k)));
    if(idx>=0) return idx;
  }
  return -1;
}

function calcIdade(nasc){
  if(!nasc) return null;
  const d = new Date(nasc);
  if(isNaN(d)) return null;
  const diff = Date.now() - d.getTime();
  return Math.floor(diff / (1000*60*60*24*365.25));
}

function faixaEtaria(idade){
  if(!idade) return null;
  if(idade < 25) return 'AtÃ© 24 anos';
  if(idade < 35) return '25â34 anos';
  if(idade < 45) return '35â44 anos';
  if(idade < 55) return '45â54 anos';
  return '55+ anos';
}

function tempoCategoria(meses){
  if(meses < 6) return 'Menos de 6 meses';
  if(meses < 12) return '6â11 meses';
  if(meses < 24) return '1â2 anos';
  if(meses < 60) return '2â5 anos';
  return 'Mais de 5 anos';
}

function groupBy(arr, fn){
  return arr.reduce((acc, v) => {
    const k = fn(v) || 'NÃ£o informado';
    acc[k] = (acc[k]||0)+1;
    return acc;
  }, {});
}

function sorted(obj){
  return Object.entries(obj).sort((a,b)=>b[1]-a[1]);
}

function barChart(data, total, title){
  if(!data || data.length===0) return `<div class="card"><h3>${title}</h3><div class="no-data"><div class="icon">ð</div>Sem informaÃ§Ãµes atualizadas</div></div>`;
  const hasUnknown = data.some(([k])=>k==='NÃ£o informado');
  const known = data.filter(([k])=>k!=='NÃ£o informado');
  const items = [...known, ...(hasUnknown ? data.filter(([k])=>k==='NÃ£o informado') : [])];
  return `<div class="card"><h3>${title}</h3>${items.map(([k,v])=>{
    const pct = total>0?Math.round(v/total*100):0;
    return `<div class="bar-item"><span class="name" title="${k}">${k}</span><div class="bar"><div class="fill" style="width:${pct}%"></div></div><span class="count">${v}</span><span class="pct">${pct}%</span></div>`;
  }).join('')}</div>`;
}

function anivCard(nomes){
  if(!nomes||nomes.length===0) return `<div class="card"><h3>ð Aniversariantes do MÃªs</h3><div class="no-data"><div class="icon">ð</div>Nenhum aniversariante este mÃªs ou data nÃ£o informada</div></div>`;
  return `<div class="card"><h3>ð Aniversariantes do MÃªs</h3><div class="aniversariantes">${nomes.map(n=>`<span class="aniv-chip">ð ${n}</span>`).join('')}</div></div>`;
}


const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzepwuAs3LRpzFwXXwlKQhPf11OoWxW5DP94ZqAowOTkA9bv0tPTus0Cy3Q-eNGPlJX/exec';

function normKey(s){ return s ? s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim() : ''; }
function groupBy(arr,fn){ return arr.reduce(function(acc,v){ var k=fn(v); var label=(!k||k==='')?'Sem informacao':k; acc[label]=(acc[label]||0)+1; return acc; },{}); }
function sorted(obj){ return Object.entries(obj).sort(function(a,b){return b[1]-a[1];}); }
function tempoCategoria(m){ if(m===null||m===undefined)return null; if(m<6)return 'Menos de 6m'; if(m<12)return '6-11 meses'; if(m<24)return '1-2 anos'; if(m<60)return '2-5 anos'; return 'Mais de 5 anos'; }
function card(t,i){ return '<div class="card"><h3>'+t+'</h3>'+i+'</div>'; }
function noData(t){ return card(t,'<div class="no-data"><div class="icon">&#128202;</div>Sem informacoes atualizadas</div>'); }
function barChart(data,total,title){
  if(!data||!data.length) return noData(title);
  var known=data.filter(function(x){return x[0]!=='Sem informacao';});
  var unknown=data.filter(function(x){return x[0]==='Sem informacao';});
  var items=known.concat(unknown);
  if(!items.length) return noData(title);
  var bars=items.map(function(x){ var pct=total>0?Math.round(x[1]/total*100):0; return '<div class="bar-item"><span class="name">'+x[0]+'</span><div class="bar"><div class="fill" style="width:'+pct+'%"></div></div><span class="count">'+x[1]+'</span><span class="pct">'+pct+'%</span></div>'; }).join('');
  return card(title,bars);
}
function anivCard(nomes){ if(!nomes||!nomes.length) return card('&#127874; Aniversariantes','<div class="no-data"><div class="icon">&#127874;</div>Nenhum aniversariante este mes</div>'); return card('&#127874; Aniversariantes','<div class="aniversariantes">'+nomes.map(function(n){return '<span class="aniv-chip">&#127881; '+n+'</span>';}).join('')+'</div>'); }
function getF(row,keys){ var hs=Object.keys(row); for(var i=0;i<keys.length;i++){ var h=hs.find(function(h){return normKey(h).indexOf(normKey(keys[i]))>=0;}); if(h&&row[h]&&String(row[h]).trim()) return String(row[h]).trim(); } return ''; }

async function loadData(){
  try{
    var res=await fetch(SCRIPT_URL);
    var json=await res.json();
    var rows=json.colaboradores||[];
    if(!rows.length){ document.getElementById('content').innerHTML='<div class="erro">Nenhum colaborador encontrado.</div>'; return; }
    var agora=new Date(); var mesAtual=agora.getMonth()+1;
    var data=rows.map(function(r){ return { nome:getF(r,['nome','colaborador']), filial:getF(r,['filial','unidade']), depto:getF(r,['departamento','setor','area']), genero:getF(r,['genero','sexo']), faixa:getF(r,['faixa etaria','faixa','idade']), escol:getF(r,['escolaridade','instrucao']), admissao:getF(r,['admissao','data admissao']), contrato:getF(r,['contrato','tipo contrato','modelo']), status:getF(r,['status','situacao','ativo']), nasc:getF(r,['nascimento','data nascimento','nasc']), }; }).filter(function(r){return r.nome&&(!r.status||/ativ/i.test(r.status)||r.status==='');});
    data=data.map(function(r){ var m=null; if(r.admissao){var d=new Date(r.admissao);if(!isNaN(d))m=Math.floor((Date.now()-d.getTime())/(1000*60*60*24*30.44));} r.meses=m; return r; });
    var total=data.length;
    var aniv=data.filter(function(r){if(!r.nasc)return false;var d=new Date(r.nasc);return !isNaN(d)&&(d.getMonth()+1)===mesAtual;}).map(function(r){return r.nome.split(' ').slice(0,2).join(' ');});
    var filiais=sorted(groupBy(data,function(r){return r.filial||null;}));
    var deptos=sorted(groupBy(data,function(r){return r.depto||null;}));
    var generos=sorted(groupBy(data,function(r){return r.genero||null;}));
    var faixas=sorted(groupBy(data,function(r){return r.faixa||null;}));
    var escols=sorted(groupBy(data,function(r){return r.escol||null;}));
    var contratos=sorted(groupBy(data,function(r){return r.contrato||null;}));
    var tempos=sorted(groupBy(data,function(r){return tempoCategoria(r.meses);}));
    var fk=filiais.filter(function(x){return x[0]!=='Sem informacao';});
    var kpis=[{num:total,label:'Colaboradores Ativos'},{num:fk.length||'?',label:'Filiais',sub:fk.map(function(x){return x[0]+': '+x[1];}).join(' &middot; ')},{num:deptos.filter(function(x){return x[0]!=='Sem informacao';}).length||'?',label:'Departamentos'},{num:aniv.length||'?',label:'Aniversariantes',sub:'neste mes'},{num:data.filter(function(r){return r.meses!==null&&r.meses<6;}).length,label:'Novos (< 6m)'},{num:data.filter(function(r){return r.meses!==null&&r.meses>=60;}).length,label:'5+ anos'}];
    var kpiHtml='<div class="kpi-grid">'+kpis.map(function(k){return '<div class="kpi"><div class="num">'+k.num+'</div><div class="label">'+k.label+'</div>'+(k.sub?'<div class="sub">'+k.sub+'</div>':'')+'</div>';}).join('')+'</div>';
    document.getElementById('update-time').textContent='Atualizado: '+agora.toLocaleString('pt-BR');
    document.getElementById('content').innerHTML=kpiHtml+'<div class="section-title">&#128205; Por Filial e Departamento</div><div class="charts-grid">'+barChart(filiais,total,'&#127970; Por Filial')+barChart(deptos,total,'&#128193; Por Departamento')+'</div>'+'<div class="section-title">&#128101; Composicao da Equipe</div><div class="charts-grid">'+barChart(generos,total,'&#9893; Genero')+barChart(faixas,total,'&#128197; Faixa Etaria')+barChart(escols,total,'&#127891; Escolaridade')+barChart(contratos,total,'&#128203; Contratacao')+'</div>'+'<div class="section-title">&#9201; Tempo de Casa</div><div class="charts-grid">'+barChart(tempos,total,'&#128336; Tempo de Casa')+anivCard(aniv)+'</div>';
  }catch(err){
    document.getElementById('update-time').textContent='Erro';
    document.getElementById('content').innerHTML='<div class="erro">&#9888; Erro: '+err.message+'</div>';
  }
}
loadData();

</script>
</body>
</html>
